org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# Disable Kotlin incremental compilation. The Kotlin incremental compiler
# stores each source file as a path relative to the module base; when the pub
# cache (plugin Kotlin sources, e.g. share_plus / shared_preferences_android)
# lives on a different Windows drive than this project, that relativization
# throws "this and base files have different roots" and fails the build. The
# only Kotlin here is small plugin modules, so full (non-incremental)
# compilation costs are negligible.
kotlin.incremental=false
# This newDsl flag was added by the Flutter template
android.newDsl=false
# This builtInKotlin flag was added by the Flutter template
android.builtInKotlin=false
