name: soft_plc_mobile
description: Mobile Soft PLC Simulator UI (Flutter)
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.3.2
  file_picker: ^8.1.6
  share_plus: ^10.1.4
  web_socket_channel: ^3.0.0
  pointycastle: ^3.9.1
  asn1lib: ^1.5.3
  path_provider: ^2.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  fake_async: ^1.3.3
  stream_channel: ^2.1.4
  flutter_lints: ^4.0.0
  shared_preferences_platform_interface: ^2.4.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.8
  image: ^4.9.1

flutter:
  uses-material-design: true

# ── Launcher icon generation (dart run flutter_launcher_icons) ──────────────
# Source art (hand-authored, 1024×1024): Icon_1024.png (opaque #08162A bg) and
# Icon_NoBackground_1024.png (transparent bg, for Android adaptive + splash).
# NOTE: tool/generate_icon.dart is the old programmatic generator; it is no
# longer the source and would write unrelated app_icon*.png — do not run it.
flutter_launcher_icons:
  image_path: "assets/icon/Icon_1024.png"
  android: true
  adaptive_icon_background: "#08162A"
  adaptive_icon_foreground: "assets/icon/Icon_NoBackground_1024.png"
  ios: true
  remove_alpha_ios: true
  background_color_ios: "#08162A"
  web:
    generate: true
    background_color: "#0F172A"
    theme_color: "#22D3EE"
  windows:
    generate: true
    icon_size: 256
  macos:
    generate: true

# ── Splash screen generation (dart run flutter_native_splash:create) ───────
flutter_native_splash:
  color: "#0F172A"
  image: "assets/icon/Icon_NoBackground_1024.png"
  android: true
  ios: true
  web: true
