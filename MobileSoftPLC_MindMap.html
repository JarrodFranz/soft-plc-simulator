<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mobile Soft PLC Simulator — Mind Map</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #07111F;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    color: #E2E8F0;
    overflow: hidden;
    user-select: none;
    height: 100vh;
    width: 100vw;
  }

  #canvas {
    width: 100%;
    height: 100%;
    cursor: grab;
    display: block;
  }
  #canvas.dragging { cursor: grabbing; }

  /* Tooltip */
  #tooltip {
    position: fixed;
    background: rgba(15, 30, 55, 0.97);
    border: 1px solid rgba(99, 179, 237, 0.35);
    border-radius: 10px;
    padding: 10px 14px;
    max-width: 260px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s ease;
    z-index: 100;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  #tooltip.visible { opacity: 1; }
  #tooltip .tt-title {
    font-size: 13px;
    font-weight: 700;
    color: #93C5FD;
    margin-bottom: 5px;
  }
  #tooltip .tt-body {
    font-size: 12px;
    color: #CBD5E1;
    line-height: 1.5;
  }

  /* Controls */
  #controls {
    position: fixed;
    bottom: 24px;
    right: 24px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    z-index: 50;
  }
  #controls button {
    width: 38px;
    height: 38px;
    border-radius: 8px;
    border: 1px solid rgba(99, 179, 237, 0.3);
    background: rgba(15, 30, 55, 0.9);
    color: #93C5FD;
    font-size: 18px;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    display: flex; align-items: center; justify-content: center;
  }
  #controls button:hover {
    background: rgba(59, 130, 246, 0.25);
    border-color: rgba(99, 179, 237, 0.7);
  }

  /* Legend */
  #legend {
    position: fixed;
    top: 20px;
    left: 20px;
    background: rgba(7, 17, 31, 0.88);
    border: 1px solid rgba(99,179,237,0.2);
    border-radius: 12px;
    padding: 14px 16px;
    z-index: 50;
  }
  #legend h3 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #64748B;
    margin-bottom: 10px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 7px;
    font-size: 12px;
    color: #CBD5E1;
  }
  .legend-dot {
    width: 12px; height: 12px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* Hint */
  #hint {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    color: #475569;
    letter-spacing: 0.04em;
    pointer-events: none;
  }

  /* Title */
  #title-bar {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    pointer-events: none;
  }
  #title-bar h1 {
    font-size: 15px;
    font-weight: 700;
    color: #E2E8F0;
    letter-spacing: 0.04em;
  }
  #title-bar p {
    font-size: 11px;
    color: #475569;
    margin-top: 2px;
  }
</style>
</head>

// ─── LAYOUT CONSTANTS ────────────────────────────────────────────────────────
const MAIN_R   = 210;   // radius from centre to main node
const SUB_R    = 400;   // radius from centre to sub-node
const FAN_DEG  = 26;    // half-angle fan for children

// ─── HELPERS ─────────────────────────────────────────────────────────────────
const DEG = Math.PI / 180;
function polar(angle_deg, radius) {
  const a = angle_deg * DEG;
  return { x: Math.cos(a) * radius, y: Math.sin(a) * radius };
}
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

// Cubic bezier path from origin to target via two control points
function bezier(x1, y1, x2, y2) {
  const cx1 = x1 * 0.45, cy1 = y1 * 0.45;
  const cx2 = x2 * 0.6,  cy2 = y2 * 0.6;
  return `M 0 0 C ${cx1} ${cy1}, ${cx2} ${cy2}, ${x2} ${y2}`;
}
function bezierBranch(px, py, x2, y2) {
  const cx1 = px * 0.6 + x2 * 0.1, cy1 = py * 0.6 + y2 * 0.1;
  const cx2 = px * 0.2 + x2 * 0.7, cy2 = py * 0.2 + y2 * 0.7;
  return `M ${px} ${py} C ${cx1} ${cy1}, ${cx2} ${cy2}, ${x2} ${y2}`;
}

// ─── SVG NAMESPACE ───────────────────────────────────────────────────────────
const NS = 'http://www.w3.org/2000/svg';
function el(tag, attrs, parent) {
  const e = document.createElementNS(NS, tag);
  for (const [k, v] of Object.entries(attrs || {})) e.setAttribute(k, v);
  if (parent) parent.appendChild(e);
  return e;
}
function svgText(lines, x, y, opts, parent) {
  const t = el('text', {
    x, y,
    'text-anchor': opts.anchor || 'middle',
    fill: opts.fill || '#E2E8F0',
    'font-size': opts.size || 11,
    'font-weight': opts.weight || '600',
    'dominant-baseline': 'middle',
  }, parent);
  if (opts.filter) t.setAttribute('filter', opts.filter);
  const lineH = (opts.size || 11) * 1.35;
  const totalH = (lines.length - 1) * lineH;
  lines.forEach((line, i) => {
    const ts = el('tspan', {
      x, dy: i === 0 ? -totalH / 2 : lineH,
    }, t);
    ts.textContent = line;
  });
  return t;
}

// ─── BUILD BRANCHES ──────────────────────────────────────────────────────────
const branchGroup = document.getElementById('branches');
const hitTargets = []; // { el, tooltip }

BRANCHES.forEach((branch) => {
  const mainPt = polar(branch.angle, MAIN_R);
  const n = branch.children.length;

  // ── Connector: centre → main node ──
  el('path', {
    d: bezier(0, 0, mainPt.x, mainPt.y),
    stroke: branch.color,
    'stroke-width': 2.5,
    fill: 'none',
    opacity: '0.55',
  }, branchGroup);

  // ── Sub-connectors and sub-nodes ──
  branch.children.forEach((child, ci) => {
    const spreadFrac = n > 1 ? (ci / (n - 1) - 0.5) * 2 : 0;
    const childAngle = branch.angle + spreadFrac * FAN_DEG;
    const subPt = polar(childAngle, SUB_R);

    // Line main → sub
    el('path', {
      d: bezierBranch(mainPt.x, mainPt.y, subPt.x, subPt.y),
      stroke: branch.color,
      'stroke-width': 1.5,
      fill: 'none',
      opacity: '0.3',
    }, branchGroup);

    // Sub-node circle
    const subCircle = el('circle', {
      cx: subPt.x, cy: subPt.y, r: 7,
      fill: '#0F1F36',
      stroke: branch.color,
      'stroke-width': 2,
    }, branchGroup);

    // Sub label
    const rightSide = subPt.x >= 0;
    const labelX = subPt.x + (rightSide ? 16 : -16);
    const lines = child.label.split('\n');
    svgText(lines, labelX, subPt.y, {
      anchor: rightSide ? 'start' : 'end',
      fill: '#CBD5E1',
      size: 10.5,
      weight: '500',
    }, branchGroup);

    // Hit target (invisible larger circle for hover)
    const hit = el('circle', {
      cx: subPt.x, cy: subPt.y, r: 20,
      fill: 'transparent',
      style: 'cursor:pointer',
    }, branchGroup);
    hitTargets.push({ el: hit, circle: subCircle, color: branch.color, tooltip: child.tooltip });
  });

  // ── Main node ──
  // Glow
  el('circle', {
    cx: mainPt.x, cy: mainPt.y, r: 28,
    fill: branch.color, opacity: '0.15',
    filter: 'url(#glow-soft)',
  }, branchGroup);
  // Fill
  const mainCircle = el('circle', {
    cx: mainPt.x, cy: mainPt.y, r: 28,
    fill: '#0D1F38',
    stroke: branch.color,
    'stroke-width': 2,
    style: 'cursor:pointer',
  }, branchGroup);
  // Icon
  const iconEl = el('text', {
    x: mainPt.x, y: mainPt.y - 6,
    'text-anchor': 'middle',
    'dominant-baseline': 'middle',
    'font-size': '16',
  }, branchGroup);
  iconEl.textContent = branch.icon;

  // Label below/above node based on angle
  const isBelow = branch.angle >= 45 && branch.angle <= 315;
  const labelLines = branch.label.split('\n');
  const labelDist = 42;
  const lpt = polar(branch.angle, MAIN_R + labelDist);
  svgText(labelLines, lpt.x, lpt.y, {
    anchor: 'middle',
    fill: branch.color,
    size: 11.5,
    weight: '700',
  }, branchGroup);

  // Main hit target
  const mainHit = el('circle', {
    cx: mainPt.x, cy: mainPt.y, r: 32,
    fill: 'transparent',
    style: 'cursor:pointer',
  }, branchGroup);
  hitTargets.push({ el: mainHit, circle: mainCircle, color: branch.color, tooltip: branch.tooltip, isMain: true });
});

// ─── TOOLTIP LOGIC ───────────────────────────────────────────────────────────
const tooltip  = document.getElementById('tooltip');
const ttTitle  = document.getElementById('tt-title');
const ttBody   = document.getElementById('tt-body');
let activeHit  = null;

function showTooltip(e, data, color) {
  ttTitle.textContent = data.title;
  ttTitle.style.color = color || '#93C5FD';
  ttBody.textContent  = data.body;
  moveTooltip(e);
  tooltip.classList.add('visible');
}
function hideTooltip() {
  tooltip.classList.remove('visible');
}
function moveTooltip(e) {
  const PAD = 14;
  const TW = tooltip.offsetWidth || 260;
  const TH = tooltip.offsetHeight || 80;
  let lx = e.clientX + PAD;
  let ly = e.clientY + PAD;
  if (lx + TW > window.innerWidth  - 8) lx = e.clientX - TW - PAD;
  if (ly + TH > window.innerHeight - 8) ly = e.clientY - TH - PAD;
  tooltip.style.left = lx + 'px';
  tooltip.style.top  = ly + 'px';
}

hitTargets.forEach(({ el: hitEl, circle, color, tooltip: ttData, isMain }) => {
  hitEl.addEventListener('mouseenter', (e) => {
    circle.setAttribute('fill', isMain ? '#142440' : color + '22');
    circle.setAttribute('stroke-width', isMain ? '2.5' : '2.5');
    showTooltip(e, ttData, color);
    activeHit = { hitEl, circle, isMain, origFill: isMain ? '#0D1F38' : '#0F1F36' };
  });
  hitEl.addEventListener('mouseleave', () => {
    circle.setAttribute('fill', isMain ? '#0D1F38' : '#0F1F36');
    circle.setAttribute('stroke-width', isMain ? '2' : '2');
    hideTooltip();
    activeHit = null;
  });
  hitEl.addEventListener('mousemove', moveTooltip);
});

// Center node tooltip
const centerNode = document.getElementById('center-node');
centerNode.addEventListener('mouseenter', (e) => {
  showTooltip(e, {
    title: '⚙️ Mobile Soft PLC Simulator',
    body: 'A full IEC 61131-3 PLC simulator running on iOS, Android, Windows, macOS, and Linux. Hosts OPC UA, Modbus TCP, MQTT Sparkplug B, DNP3, and EtherNet/IP servers in-app — no companion hardware required.'
  }, '#60A5FA');
});
centerNode.addEventListener('mouseleave', hideTooltip);
centerNode.addEventListener('mousemove', moveTooltip);

// ─── PAN & ZOOM ──────────────────────────────────────────────────────────────
const scene  = document.getElementById('scene');
const canvas = document.getElementById('canvas');

let tx = 0, ty = 0, scale = 1;
let isDragging = false, startX = 0, startY = 0, startTx = 0, startTy = 0;

function applyTransform() {
  scene.setAttribute('transform', `translate(${tx},${ty}) scale(${scale})`);
}

function centreView() {
  const W = canvas.clientWidth || window.innerWidth;
  const H = canvas.clientHeight || window.innerHeight;
  tx = W / 2; ty = H / 2; scale = 1;
  applyTransform();
}

window.addEventListener('load', centreView);
window.addEventListener('resize', centreView);

canvas.addEventListener('pointerdown', (e) => {
  if (e.target.closest('#center-node') || hitTargets.some(h => h.el === e.target)) return;
  isDragging = true;
  startX = e.clientX; startY = e.clientY;
  startTx = tx; startTy = ty;
  canvas.classList.add('dragging');
  canvas.setPointerCapture(e.pointerId);
});
canvas.addEventListener('pointermove', (e) => {
  if (!isDragging) return;
  tx = startTx + (e.clientX - startX);
  ty = startTy + (e.clientY - startY);
  applyTransform();
});
canvas.addEventListener('pointerup', () => {
  isDragging = false;
  canvas.classList.remove('dragging');
});

canvas.addEventListener('wheel', (e) => {
  e.preventDefault();
  const factor = e.deltaY < 0 ? 1.1 : 0.91;
  const newScale = clamp(scale * factor, 0.25, 4);
  // Zoom towards cursor
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  tx = mx - (mx - tx) * (newScale / scale);
  ty = my - (my - ty) * (newScale / scale);
  scale = newScale;
  applyTransform();
}, { passive: false });

// Touch pinch
let lastDist = null;
canvas.addEventListener('touchstart', (e) => {
  if (e.touches.length === 2) {
    lastDist = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
  }
}, { passive: true });
canvas.addEventListener('touchmove', (e) => {
  if (e.touches.length === 2 && lastDist !== null) {
    const d = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
    const factor = d / lastDist;
    scale = clamp(scale * factor, 0.25, 4);
    lastDist = d;
    applyTransform();
  }
}, { passive: true });
canvas.addEventListener('touchend', () => { lastDist = null; });

// Buttons
document.getElementById('btn-zoom-in').addEventListener('click', () => {
  const W = canvas.clientWidth / 2, H = canvas.clientHeight / 2;
  const newScale = clamp(scale * 1.2, 0.25, 4);
  tx = W - (W - tx) * (newScale / scale);
  ty = H - (H - ty) * (newScale / scale);
  scale = newScale;
  applyTransform();
});
document.getElementById('btn-zoom-out').addEventListener('click', () => {
  const W = canvas.clientWidth / 2, H = canvas.clientHeight / 2;
  const newScale = clamp(scale / 1.2, 0.25, 4);
  tx = W - (W - tx) * (newScale / scale);
  ty = H - (H - ty) * (newScale / scale);
  scale = newScale;
  applyTransform();
});
document.getElementById('btn-reset').addEventListener('click', centreView);
</script>
</body>
